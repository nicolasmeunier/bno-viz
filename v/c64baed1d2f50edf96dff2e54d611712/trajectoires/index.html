  <style>
    :root {
      --paper:#f4efe6; --ink:#1f2430; --muted:#6a717f;
      --border:rgba(31,36,48,0.12); --shadow:0 22px 60px rgba(19,26,38,0.09);
      --navy:#17324d; --navy-soft:#dbe4ef;
      --nuc:#1e5a5f; --nuc-soft:#e4f1f1;
      --vre:#b45309; --vre-soft:#fff1e8;
      --solar:#d4a017; --wind:#2e7d9a; --offshore:#e07020;
      --batt:#7c3aed; --hydro:#2563eb;
      --good:#1f7a5a; --warn:#b75d17; --bad:#b42318;
      --page:min(1280px,calc(100vw - 32px));
    }
    *{box-sizing:border-box}
    body{margin:0;background:linear-gradient(180deg,#f7f3ea 0%,#f1eadf 100%);
      color:var(--ink);font-family:"Palatino Linotype","Book Antiqua",Palatino,Georgia,serif;line-height:1.45}
    .page{width:var(--page);margin:0 auto;padding:32px 0 72px}
    .panel{background:rgba(251,248,242,0.92);border:1px solid var(--border);
      box-shadow:var(--shadow);border-radius:28px;padding:28px;margin-bottom:24px}
    .eyebrow{display:inline-flex;padding:8px 12px;border-radius:999px;
      background:rgba(23,50,77,0.08);color:var(--navy);
      font-size:0.78rem;letter-spacing:0.08em;text-transform:uppercase;font-weight:700}
    h1{margin:14px 0;font-size:clamp(2.2rem,4vw,3.5rem);line-height:1.05;letter-spacing:-0.03em}
    h2{font-size:1.65rem;margin:0 0 14px}
    .lead{color:var(--muted);font-size:1.08rem;max-width:720px}
    .section{margin-top:34px}
    .grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
    .grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
    @media(max-width:900px){.grid-2,.grid-4{grid-template-columns:1fr}}
    .card{background:rgba(251,248,242,0.9);border:1px solid var(--border);
      box-shadow:var(--shadow);border-radius:22px;padding:22px}
    .card h3{margin:0 0 8px;font-size:1.15rem}
    .card .big{font-size:2rem;font-weight:700;letter-spacing:-0.04em;line-height:1.1}
    .card .sub{color:var(--muted);font-size:0.88rem;margin-top:6px}
    .rank-1{border-left:4px solid var(--good)}
    .rank-4{border-left:4px solid var(--bad)}
    .chart-container{position:relative;width:100%;height:320px;margin:16px 0}
    .chart-container.tall{height:400px}
    .chart-bar{position:absolute;bottom:0;border-radius:4px 4px 0 0;transition:height 0.3s}
    .chart-line{fill:none;stroke-width:2.5;stroke-linecap:round;stroke-linejoin:round}
    .chart-area{opacity:0.15}
    .legend{display:flex;flex-wrap:wrap;gap:12px;margin:12px 0;font-size:0.82rem}
    .legend-item{display:flex;align-items:center;gap:5px}
    .legend-dot{width:12px;height:12px;border-radius:3px;flex-shrink:0}
    .verdict{margin-top:16px;padding:14px 16px;border-radius:16px;font-weight:700;line-height:1.45}
    .verdict.good{background:rgba(31,122,90,0.1);color:#1f7a5a}
    .verdict.bad{background:rgba(180,35,24,0.08);color:#8b2020}
    .verdict.info{background:rgba(23,50,77,0.08);color:var(--navy)}
    table.data{width:100%;border-collapse:collapse;font-size:0.92rem;margin:12px 0}
    table.data th,table.data td{padding:10px 8px;border-bottom:1px solid rgba(23,50,77,0.1);text-align:left}
    table.data thead th{font-size:0.75rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted)}
    .highlight{color:var(--bad);font-weight:700}
    .highlight-good{color:var(--good);font-weight:700}
    .source{color:var(--muted);font-size:0.78rem;margin-top:8px;font-style:italic}
    svg{display:block}

    // --- SVG line chart helper ---
    function svgLineChart(series, {width=800, height=300, yLabel='', yFmt=fmt, xMin=2025, xMax=2050}={}) {
      const margin = {top:20, right:16, bottom:30, left:65};
      const w = width - margin.left - margin.right;
      const h = height - margin.top - margin.bottom;

      let allY = series.flatMap(s => s.data.map(d=>d.y));
      let yMin = Math.min(0, ...allY);
      let yMax = Math.max(...allY) * 1.1;
      if (yMax <= yMin) yMax = yMin + 1;

      const sx = x => margin.left + (x - xMin) / (xMax - xMin) * w;
      const sy = y => margin.top + (1 - (y - yMin) / (yMax - yMin)) * h;

      let svg = `<svg viewBox="0 0 ${width} ${height}" style="width:100%;max-height:${height}px">`;
      // Grid lines
      const nTicks = 5;
      for (let i = 0; i <= nTicks; i++) {
        const yVal = yMin + (yMax - yMin) * i / nTicks;
        const yy = sy(yVal);
        svg += `<line x1="${margin.left}" y1="${yy}" x2="${width-margin.right}" y2="${yy}" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>`;
        svg += `<text x="${margin.left-8}" y="${yy+4}" text-anchor="end" fill="#6a717f" font-size="11" font-family="system-ui">${yFmt(yVal)}</text>`;
      }
      // X axis labels
      for (let yr = xMin; yr <= xMax; yr += 5) {
        svg += `<text x="${sx(yr)}" y="${height-6}" text-anchor="middle" fill="#6a717f" font-size="11" font-family="system-ui">${yr}</text>`;
      }
      // Y axis label
      svg += `<text x="14" y="${margin.top + h/2}" text-anchor="middle" fill="#6a717f" font-size="11" font-family="system-ui" transform="rotate(-90,14,${margin.top+h/2})">${yLabel}</text>`;
      // Lines (no end labels — the legend below identifies them)
      for (const s of series) {
        const pts = s.data.map(d => `${sx(d.x)},${sy(d.y)}`).join(' ');
        if (s.area) {
          const areaPath = s.data.map(d=>`${sx(d.x)},${sy(d.y)}`).join('L');
          svg += `<path d="M${sx(s.data[0].x)},${sy(0)}L${areaPath}L${sx(s.data[s.data.length-1].x)},${sy(0)}Z" fill="${s.color}" class="chart-area"/>`;
        }
        svg += `<polyline points="${pts}" fill="none" stroke="${s.color}" stroke-width="${s.width||2.5}" stroke-linecap="round" stroke-linejoin="round" ${s.dash?`stroke-dasharray="${s.dash}"`:''}/>`;
        // End dot instead of text label
        const last = s.data[s.data.length-1];
        svg += `<circle cx="${sx(last.x)}" cy="${sy(last.y)}" r="4" fill="${s.color}"/>`;
      }
      svg += '</svg>';
      return svg;
    }

    // --- Stacked bar chart for fleet ---
    function svgStackedBars(pathwayId, traj, {width=800, height=320}={}) {
      const rows = getRows(pathwayId, traj);
      const techs = ['hydro','nuclear_existing','epr2','onshore_wind','solar','offshore_float','battery'];
      const milestones = [2025,2030,2035,2040,2045,2050];
      const margin = {top:20,right:20,bottom:30,left:55};
      const w = width - margin.left - margin.right;
      const h = height - margin.top - margin.bottom;
      const barW = w / milestones.length * 0.7;
      const gap = w / milestones.length * 0.3;

      // Get fleet data from rows
      const fleetByYear = {};
      for (const r of rows) {
        if (milestones.includes(r.year)) {
          fleetByYear[r.year] = r;
        }
      }

      let maxGW = 0;
      for (const yr of milestones) {
        const r = fleetByYear[yr];
        if (r) maxGW = Math.max(maxGW, r.fleet_total_mw / 1000);
      }
      maxGW *= 1.15;

      const sx = (i) => margin.left + i * (barW + gap) + gap/2;
      const sy = (gw) => margin.top + (1 - gw / maxGW) * h;

      let svg = `<svg viewBox="0 0 ${width} ${height}" style="width:100%;max-height:${height}px">`;

      // Y grid
      for (let gw = 0; gw <= maxGW; gw += 50) {
        svg += `<line x1="${margin.left}" y1="${sy(gw)}" x2="${width-margin.right}" y2="${sy(gw)}" stroke="rgba(0,0,0,0.06)" stroke-width="1"/>`;
        svg += `<text x="${margin.left-8}" y="${sy(gw)+4}" text-anchor="end" fill="#6a717f" font-size="10" font-family="system-ui">${gw}</text>`;
      }
      svg += `<text x="12" y="${margin.top+h/2}" text-anchor="middle" fill="#6a717f" font-size="10" font-family="system-ui" transform="rotate(-90,12,${margin.top+h/2})">GW installes</text>`;

      for (let i = 0; i < milestones.length; i++) {
        const yr = milestones[i];
        const r = fleetByYear[yr];
        if (!r) continue;
        const x = sx(i);
        let cumGW = 0;

        // We need to reconstruct tech breakdown from fleet_vre_mw, fleet_nuclear_mw, etc.
        // Since we don't have per-tech breakdown in year rows, approximate:
        const nucExisting = Math.max(0, r.fleet_nuclear_mw - (yr >= 2035 ? Math.min(r.fleet_nuclear_mw, countEpr2(pathwayId, yr) * 1650) : 0));
        const epr2GW = yr >= 2035 ? Math.min(r.fleet_nuclear_mw, countEpr2(pathwayId, yr) * 1650) / 1000 : 0;
        const nucExistGW = r.fleet_nuclear_mw / 1000 - epr2GW;
        const hydroGW = 25; // Fixed
        const vreGW = r.fleet_vre_mw / 1000;
        const totalGW = r.fleet_total_mw / 1000;
        const otherGW = Math.max(0, totalGW - nucExistGW - epr2GW - hydroGW - vreGW);

        // Approximate VRE breakdown (proportional to 2025 starting ratios + builds)
        const stack = [
          {tech:'hydro', gw: hydroGW},
          {tech:'nuclear_existing', gw: Math.max(0, nucExistGW)},
          {tech:'epr2', gw: epr2GW},
          {tech:'onshore_wind', gw: vreGW * 0.35},
          {tech:'solar', gw: vreGW * 0.45},
          {tech:'offshore_float', gw: vreGW * 0.10},
          {tech:'battery', gw: vreGW * 0.10 + otherGW},
        ];

        let cumY = 0;
        for (const {tech, gw} of stack) {
          if (gw <= 0) continue;
          const barH = (gw / maxGW) * h;
          const yTop = sy(cumY + gw);
          svg += `<rect x="${x}" y="${yTop}" width="${barW}" height="${barH}" fill="${TECH_COLORS[tech]||'#999'}"/>`;
          cumY += gw;
        }

        // Year label
        svg += `<text x="${x + barW/2}" y="${height-6}" text-anchor="middle" fill="#6a717f" font-size="11" font-family="system-ui">${yr}</text>`;
        // Total label
        svg += `<text x="${x + barW/2}" y="${sy(cumY)-6}" text-anchor="middle" fill="var(--ink)" font-size="11" font-weight="700" font-family="system-ui">${Math.round(cumY)} GW</text>`;
      }

      svg += '</svg>';
      return svg;
    }

    function countEpr2(pw, byYear) {
      // Rough count based on pathway definitions
      const epr2Years = {
        ppe3: [2038,2040,2043,2045,2047,2049],
        ppe3_with_bno: [2038,2040,2043,2045,2047,2049],
        nuclear_heavy: [2035,2037,2039,2041,2043,2045,2047,2049],
        renewable_heavy: []
      };
      return (epr2Years[pw]||[]).filter(y => y <= byYear).length;
    }

        label: (PW_LABELS[pw]||pw).split(' ')[0],
        color: PW_COLORS[pw],
        data: getRows(pw, CENTRAL).map(r => ({x: r.year, y: (r.full_system_cost_meur_y||0) / 1000}))
      }));

      html += svgLineChart(fullCostSeries, {
        width: 500, height: 300,
        yLabel: 'Md EUR / an',
        yFmt: v => fmt(v, 0)
      });
      html += `<div class="source">Inclut parc existant (~32 Md), reseau (~22 Md), nouvelles constructions, flexibilite. Taux 4 %.</div>`;
      html += `</div>`;

      // Ledger 5: Incremental cost of new builds only
      html += `<div class="panel"><h3>Ledger 5 : Surcout des nouvelles constructions</h3>`;

      const newCostSeries = ranked.map(pw => ({
        label: (PW_LABELS[pw]||pw).split(' ')[0],
        color: PW_COLORS[pw],
        data: getRows(pw, CENTRAL).map(r => ({x: r.year, y: r.net_public_cost_meur_y / 1000}))
      }));

      html += svgLineChart(newCostSeries, {
        width: 500, height: 300,
        yLabel: 'Md EUR / an',
        yFmt: v => fmt(v, 0)
      });
      html += `<div class="source">Cout incremental des projets commissionnes apres 2025 uniquement.</div>`;
      html += `</div></div>`;

      // Legend
      html += `<div class="legend" style="justify-content:center">`;
      for (const pw of ranked) {
        html += `<div class="legend-item"><div class="legend-dot" style="background:${PW_COLORS[pw]}"></div>${PW_LABELS[pw]}</div>`;
      }
      html += `</div></section>`;

      // SECTION 3: Fleet evolution (2x2 grid)
      html += `<section class="section"><h2>3. Ce qu'on construit</h2>
        <p style="color:var(--muted)">Capacite installee (GW) a chaque etape, demande centrale.</p>`;

      // Tech legend ABOVE the grid
      html += `<div class="legend" style="justify-content:center;margin-bottom:12px">`;
      for (const [tech, color] of Object.entries(TECH_COLORS)) {
        html += `<div class="legend-item"><div class="legend-dot" style="background:${color}"></div>${TECH_LABELS[tech]||tech}</div>`;
      }
      html += `</div>`;

      html += `<div class="grid-2">`;
      for (const pw of ranked) {
        html += `<div class="panel"><h3 style="color:${PW_COLORS[pw]}">${PW_LABELS[pw]}</h3>`;
        html += svgStackedBars(pw, CENTRAL, {width:500, height:280});
        html += `</div>`;
      }
      html += `</div></section>`;

      // SECTION 4: System state
      html += `<section class="section"><h2>4. Comment le systeme evolue</h2>
        <p style="color:var(--muted)">Prix de marche et part de renouvelables, demande centrale.</p>
        <div class="grid-2">`;

      // Price chart
      html += `<div class="panel"><h3>Prix moyen du marche</h3>`;
      const priceSeries = ranked.map(pw => ({
        label: (PW_LABELS[pw]||pw).split(' ')[0],
        color: PW_COLORS[pw],
        data: getRows(pw, CENTRAL).map(r => ({x: r.year, y: r.market_price_eur_per_mwh}))
      }));
      html += svgLineChart(priceSeries, {width:500, height:260, yLabel:'EUR/MWh', yFmt:v=>fmt(v,0)});
      html += `</div>`;

      // VRE share chart
      html += `<div class="panel"><h3>Part VRE dans le parc</h3>`;
      const vreSeries = ranked.map(pw => ({
        label: (PW_LABELS[pw]||pw).split(' ')[0],
        color: PW_COLORS[pw],
        data: getRows(pw, CENTRAL).map(r => ({x: r.year, y: r.vre_share * 100}))
      }));
      html += svgLineChart(vreSeries, {width:500, height:260, yLabel:'%', yFmt:v=>fmt(v,0)+'%'});
      html += `</div></div></section>`;

      // SECTION 5: BNO delta
      const ppe3S = getSummary('ppe3', CENTRAL);
      const bnoS = getSummary('ppe3_with_bno', CENTRAL);
      if (ppe3S && bnoS) {
        const deltaNPV = bnoS.npv_public_cost_meur - ppe3S.npv_public_cost_meur;
        const deltaPlant = bnoS.total_plant_cost_meur - ppe3S.total_plant_cost_meur;
        const deltaConnect = bnoS.total_connection_cost_meur - ppe3S.total_connection_cost_meur;
        const deltaSettle = bnoS.total_settlement_meur - ppe3S.total_settlement_meur;
        const deltaSys = bnoS.total_system_cost_meur - ppe3S.total_system_cost_meur;
        const deltaValue = bnoS.total_value_recovered_meur - ppe3S.total_value_recovered_meur;

        html += `<section class="section"><h2>5. Ce que BNO ajoute au plan PPE3</h2>
          <p style="color:var(--muted)">Cout incremental de l'ajout de 2 GW d'eolien flottant BNO en 2033 au plan gouvernemental.</p>
          <div class="panel">
            <div class="big" style="color:var(--bad)">+${fmtMd(deltaNPV)} Md EUR</div>
            <div class="sub">Surcout NPV cumule 2025-2050 au taux social de 4 %</div>

            <table class="data" style="margin-top:20px">
              <thead><tr><th>Composante</th><th style="text-align:right">Delta (MEUR cumule)</th></tr></thead>
              <tbody>
                <tr><td>Cout de production</td><td style="text-align:right" class="highlight">+${fmt(deltaPlant,0)}</td></tr>
                <tr><td>Raccordement</td><td style="text-align:right" class="highlight">+${fmt(deltaConnect,0)}</td></tr>
                <tr><td>Soutien public (CfD)</td><td style="text-align:right">${fmt(deltaSettle,0)}</td></tr>
                <tr><td>Couts systeme</td><td style="text-align:right">${fmt(deltaSys,0)}</td></tr>
                <tr><td>Valeur recuperee</td><td style="text-align:right" class="${deltaValue>0?'highlight-good':'highlight'}">${fmt(deltaValue,0)}</td></tr>
                <tr style="font-weight:700;border-top:2px solid var(--ink)"><td>Total NPV</td><td style="text-align:right" class="highlight">+${fmt(deltaNPV,0)}</td></tr>
              </tbody>
            </table>

            <div class="verdict bad">
              Ajouter BNO au plan PPE3 coute ${fmtMd(deltaNPV)} Md EUR supplementaires sur 25 ans,
              soit environ ${fmt(deltaNPV / 26, 0)} MEUR/an. Ce surcout vient principalement
              du cout de production et du raccordement offshore.
            </div>
          </div>
        </section>`;
      }

      // SECTION 6: Demand sensitivity
      html += `<section class="section"><h2>6. Sensibilite a la demande</h2>
        <p style="color:var(--muted)">NPV du cout public sous trois trajectoires de demande.</p>
        <div class="panel">
          <table class="data">
            <thead><tr><th>Trajectoire</th>`;
      for (const pw of ranked) html += `<th style="text-align:right;color:${PW_COLORS[pw]}">${PW_LABELS[pw]}</th>`;
      html += `</tr></thead><tbody>`;
      for (const traj of TRAJS) {
        html += `<tr><td>${traj}</td>`;
        for (const pw of ranked) {
          const s = getSummary(pw, traj);
          html += `<td style="text-align:right">${s ? fmtMd(s.npv_public_cost_meur)+' Md' : '-'}</td>`;
        }
        html += `</tr>`;
      }
      html += `</tbody></table>
        <div class="verdict info">
          Quel que soit le niveau de demande, le classement des trajectoires reste identique :
          ${ranked.map(pw => PW_LABELS[pw]).join(' < ')}.
        </div>
      </div></section>`;

      // METHOD
      html += `<section class="section" style="margin-top:48px">
        <p class="source">
          Methode : simulation de trajectoire annuelle 2025-2050 avec le <em>value engine</em>.
          Chaque annee, la composition du parc determine les conditions de marche
          (prix, heures negatives, curtailment) via des formules calibrees sur les
          resultats 2025 observe et 2035 stylise.
          Couts technologies : CRE 2025, Cour des Comptes Jan 2025, NREL ATB 2024.
          Brownfield : courbe EDF fevrier 2026. Taux social : 4 % (Commission Quinet).
        </p>
      </section>`;

      app.innerHTML = html;
    }

    render();
  </script>
</body>
</html>
